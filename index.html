<style>
:root{
  --ink:#1a1a2e;--bg:#fef9e7;
  --hot:#f72585;--yellow:#fbbf24;--cyan:#06b6d4;
  --green:#10b981;--py:#2563eb;--net:#7c3aed;
  --teal:#0d9488;--orange:#f59e0b;
  --border:3px solid #1a1a2e;--sh:5px 5px 0 #1a1a2e;
  --ft:'Bangers',cursive;--fb:'Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--ink);font-family:var(--fb);display:flex;flex-direction:column;}

/* ── BRAND BAR ── */
.brand-bar{
  background:var(--ink);border-bottom:3px solid var(--hot);
  padding:.3rem 1.5rem;display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:.3rem;
  flex-shrink:0;z-index:300;
}
.brand-logo{font-family:var(--ft);font-size:2.2rem;color:var(--yellow);letter-spacing:3px;line-height:1;cursor:pointer;transition:transform .2s;}
.brand-logo:hover{transform:scale(1.05);}
.brand-logo span{color:var(--cyan);}
.brand-meta{font-size:.72rem;color:#aaa;line-height:1.55;}
.brand-meta strong{color:#eee;}
.brand-meta a{color:var(--yellow);text-decoration:none;}
.brand-right{display:flex;align-items:center;gap:.7rem;}
.live-pill{display:inline-flex;align-items:center;gap:.4rem;background:rgba(16,185,129,.12);border:1.5px solid rgba(16,185,129,.35);border-radius:20px;padding:.2rem .8rem;font-size:.7rem;color:#6ee7b7;font-weight:700;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:blink 1.5s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* ── TAB BAR ── */
.tab-bar{
  background:linear-gradient(180deg,#0a0a18,#1a1a2e);
  border-bottom:4px solid var(--yellow);
  display:flex;align-items:flex-end;
  padding:.55rem 1rem 0;gap:.3rem;
  overflow-x:auto;flex-shrink:0;
  scrollbar-width:thin;scrollbar-color:var(--hot) #111;
}
.tab-bar::-webkit-scrollbar{height:4px;}
.tab-bar::-webkit-scrollbar-thumb{background:var(--hot);border-radius:2px;}
.tab{
  font-family:var(--ft);font-size:.95rem;letter-spacing:1.5px;
  padding:.45rem 1.1rem .62rem;
  border:2.5px solid rgba(255,255,255,.08);border-bottom:none;
  border-radius:10px 10px 0 0;
  cursor:pointer;color:#9090b8;background:rgba(255,255,255,.06);
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;position:relative;top:4px;outline:none;
  display:inline-flex;align-items:center;gap:.35rem;user-select:none;
}
.tab:hover{background:rgba(255,255,255,.1);color:#c8cce0;top:2px;}
.tab.act-y{background:#d4a820;color:#1a1400;top:0;border-color:#d4a820;box-shadow:0 -3px 0 #d4a820;transform:scale(1.05);}
.tab.act-b{background:#1e5fc8;color:#fff;top:0;border-color:#1e5fc8;box-shadow:0 -3px 0 #1e5fc8;transform:scale(1.05);}
.tab.act-p{background:#6030c8;color:#fff;top:0;border-color:#6030c8;box-shadow:0 -3px 0 #6030c8;transform:scale(1.05);}
.tab.act-h{background:#d81870;color:#fff;top:0;border-color:#d81870;box-shadow:0 -3px 0 #d81870;transform:scale(1.05);}
.tab.act-t{background:#0a8878;color:#fff;top:0;border-color:#0a8878;box-shadow:0 -3px 0 #0a8878;transform:scale(1.05);}
.tab.act-o{background:#d08010;color:#fff;top:0;border-color:#d08010;box-shadow:0 -3px 0 #d08010;transform:scale(1.05);}
.tab.act-g{background:#0a9858;color:#fff;top:0;border-color:#0a9858;box-shadow:0 -3px 0 #0a9858;transform:scale(1.05);}
.nbadge{display:inline-block;background:var(--hot);color:#fff;font-size:.48rem;padding:1px 5px;border-radius:10px;font-family:var(--fb);font-weight:800;border:1px solid rgba(255,255,255,.4);animation:pulse-n 2s ease-in-out infinite;vertical-align:middle;}
@keyframes pulse-n{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}

/* ── MAIN AREA ── */
.main-area{flex:1;overflow:hidden;display:flex;}
.frame-wrap{flex:1;overflow:hidden;position:relative;background:var(--bg);}
#cf{width:100%;height:100%;border:none;display:block;}

/* ── LOADING ── */
.loader{position:absolute;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;z-index:200;transition:opacity .35s ease;}
.loader.gone{opacity:0;pointer-events:none;}
.ld-logo{font-family:var(--ft);font-size:4rem;color:var(--yellow);letter-spacing:4px;animation:pulse-n 1.4s ease-in-out infinite;}
.ld-logo span{color:var(--cyan);}
.ld-bar{width:220px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.ld-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--hot),var(--yellow),var(--cyan),var(--green));background-size:300% 100%;animation:bar-slide 1.3s ease-in-out infinite;}
@keyframes bar-slide{0%{background-position:100% 0;}100%{background-position:-100% 0;}}
.ld-txt{font-family:var(--fb);font-size:.82rem;color:#777;letter-spacing:1.5px;}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .brand-meta{display:none;}
  .brand-logo{font-size:1.6rem;}
  .tab{font-size:.72rem;padding:.3rem .6rem .45rem;letter-spacing:.5px;}
  .tab-bar{padding:.4rem .5rem 0;gap:.18rem;}
}
@media(max-width:480px){
  .tab{font-size:.65rem;padding:.28rem .45rem .4rem;}
}

.interview-pill{display:inline-flex;align-items:center;gap:.4rem;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;font-family:var(--ft);font-size:1rem;letter-spacing:1.5px;padding:.18rem .85rem;border-radius:20px;cursor:pointer;transition:all .18s;white-space:nowrap;box-shadow:0 2px 8px rgba(14,165,233,.3);}
.interview-pill:hover{transform:scale(1.05);box-shadow:0 3px 14px rgba(14,165,233,.5);}
.ipill-new{background:rgba(255,255,255,.25);color:#fff;font-size:.55rem;font-weight:800;font-family:var(--fb);padding:1px 5px;border-radius:4px;letter-spacing:.05em;}
</style>

<!-- ═══ BRAND BAR ═══ -->
<div class="brand-bar">
  <div class="brand-left">
    <div class="brand-logo" onclick="loadPage('home.html','act-y',0)">AI<span>Cycle</span></div>
    <div class="brand-meta">
      Built with 🧠 by <strong>Ashish Sinha</strong> · AI Developer ·
      <a href="mailto:startvsnotes@gmail.com">✉️ startvsnotes@gmail.com</a> · © 2025
    </div>
  </div>
  <div class="brand-right">
    <div class="interview-pill" onclick="loadPage('interview.html','act-h',12)">🎤 AI Interview Q&amp;A <span class="ipill-new">NEW</span></div>
    <div class="live-pill"><span class="live-dot"></span><span id="hit-count">...</span> visits</div>
  </div>
</div>

<!-- ═══ TAB BAR ═══ -->
<div class="tab-bar">
  <button class="tab act-y" data-src="home.html"          data-ac="act-y" onclick="loadPage(this.dataset.src,this.dataset.ac,0)">🏠 HOME</button>
  <button class="tab"       data-src="intro.html"         data-ac="act-y" onclick="loadPage(this.dataset.src,this.dataset.ac,1)">🌱 INTRO</button>
  <button class="tab"       data-src="ml.html"            data-ac="act-b" onclick="loadPage(this.dataset.src,this.dataset.ac,2)">📊 ML</button>
  <button class="tab"       data-src="deeplearning.html"  data-ac="act-p" onclick="loadPage(this.dataset.src,this.dataset.ac,3)">🕸️ DEEP LEARNING</button>
  <button class="tab"       data-src="llms.html"          data-ac="act-b" onclick="loadPage(this.dataset.src,this.dataset.ac,4)">💬 LLMs</button>
  <button class="tab"       data-src="rag.html"           data-ac="act-g" onclick="loadPage(this.dataset.src,this.dataset.ac,5)">🔍 RAG</button>
  <button class="tab"       data-src="agentic.html"       data-ac="act-h" onclick="loadPage(this.dataset.src,this.dataset.ac,6)">⚡ AGENTIC AI</button>
  <button class="tab"       data-src="python-rag.html"    data-ac="act-b" onclick="loadPage(this.dataset.src,this.dataset.ac,7)">🐍 PYTHON RAG</button>
  <button class="tab"       data-src="dotnet-rag.html"    data-ac="act-p" onclick="loadPage(this.dataset.src,this.dataset.ac,8)">🟣 .NET RAG</button>
  <button class="tab"       data-src="qa-automation.html" data-ac="act-t" onclick="loadPage(this.dataset.src,this.dataset.ac,9)">🧪 QA AUTO</button>
  <button class="tab"       data-src="tools.html"         data-ac="act-o" onclick="loadPage(this.dataset.src,this.dataset.ac,10)">🛠️ TOOLS</button>
  <button class="tab"       data-src="career.html"        data-ac="act-g" onclick="loadPage(this.dataset.src,this.dataset.ac,11)">🎯 CAREER</button>
</div>

<!-- ═══ MAIN AREA ═══ -->
<div class="main-area">
  <div class="frame-wrap">
    <div class="loader" id="loader">
      <div class="ld-logo">AI<span>Cycle</span></div>
      <div class="ld-bar"><div class="ld-fill"></div></div>
      <div class="ld-txt">Loading...</div>
    </div>
    <iframe id="cf" src="home.html" title="AICycle Content" allowfullscreen></iframe>
  </div>
</div>

<script>
const frame  = document.getElementById('cf');
const loader = document.getElementById('loader');
const tabs   = document.querySelectorAll('.tab');
const ALL_ACS= ['act-y','act-b','act-p','act-h','act-t','act-o','act-g'];
let currentIdx = 0, currentSrc = 'home.html';

function loadPage(src, ac, idx){
  tabs.forEach(t=>t.classList.remove(...ALL_ACS));
  if(typeof idx==='number') tabs[idx]?.classList.add(ac);
  loader.classList.remove('gone');
  frame.src = src;
  currentIdx = idx; currentSrc = src;
  history.replaceState(null,'','#'+src.replace('.html',''));
}

frame.addEventListener('load',()=>setTimeout(()=>loader.classList.add('gone'),250));
window.addEventListener('load',()=>setTimeout(()=>loader.classList.add('gone'),400));

/* ── VISIT COUNTER ── */
(function(){
  const k='acyc_v'; const n=parseInt(localStorage.getItem(k)||'2847')+1;
  localStorage.setItem(k,n);
  const el=document.getElementById('hit-count');
  let c=n-40; const tick=setInterval(()=>{c+=4;if(c>=n){c=n;clearInterval(tick);}
    if(el) el.textContent=c.toLocaleString();
  },35);
})();

/* ── GA4 ── */
(function(){
  const s=document.createElement('script');s.async=true;
  s.src='https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX';
  document.head.appendChild(s);
  window.dataLayer=window.dataLayer||[];
  function gtag(){dataLayer.push(arguments);}
  gtag('js',new Date());gtag('config','G-XXXXXXXXXX');
})();

/* ── KEYBOARD SHORTCUTS ── */
document.addEventListener('keydown',e=>{
  if(e.altKey&&!e.shiftKey&&e.key>='1'&&e.key<='9'){
    const t=tabs[parseInt(e.key)-1];
    if(t) loadPage(t.dataset.src,t.dataset.ac,parseInt(e.key)-1);
  }
  if(e.altKey&&e.key==='ArrowLeft'&&currentIdx>0){
    const t=tabs[currentIdx-1];loadPage(t.dataset.src,t.dataset.ac,currentIdx-1);
  }
  if(e.altKey&&e.key==='ArrowRight'&&currentIdx<tabs.length-1){
    const t=tabs[currentIdx+1];loadPage(t.dataset.src,t.dataset.ac,currentIdx+1);
  }
});

/* ── HASH ROUTING ── */
(function(){
  const h=window.location.hash.slice(1);
  if(!h) return;
  const btn=Array.from(tabs).find(t=>t.dataset.src===h+'.html');
  if(btn){const i=Array.from(tabs).indexOf(btn);loadPage(btn.dataset.src,btn.dataset.ac,i);}
})();
</script>
</body>
